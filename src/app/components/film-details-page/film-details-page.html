<app-button (buttonClick)="goToHome()" variant="primary" #btn
  >Back to Home</app-button
>

@if (film(); as film) {
  <div class="card">
    <img class="card__image" [src]="film.posterUrl" [alt]="film.title" />
    <div class="card__content">
      <h2 class="card__title">{{ film.title }}</h2>
      <div class="card__about">
        <p class="card__genre">Genre: {{ film.genre }}</p>
        <p class="card__year">Year: {{ film.year }}</p>
        <p class="card__rating">Rating: {{ film.rating }}</p>
        <p class="card__duration">
          Duration: {{ film.duration | filmDuration }}
        </p>
      </div>
      <p class="card__description">
        {{ film.description }}
      </p>
    </div>
  </div>
}
