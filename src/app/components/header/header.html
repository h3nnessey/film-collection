<header class="header">
  <h1>{{ title() }}</h1>
  <nav class="nav">
    @for (item of navItems(); track item.path) {
      <a
        class="link"
        [routerLink]="item.path"
        routerLinkActive="link_active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        >{{ item.label }}</a
      >
    }
  </nav>
</header>
