<app-search-bar (inputChange)="filterFilms($event)" />

@if (filteredFilms().length > 0) {
  <div class="cards">
    @for (film of filteredFilms(); track film.id) {
      <app-film-card
        [film]="film"
        (toggleFavorite)="handleToggleFavorite(film.id)"
      />
    }
  </div>
} @else {
  <h2>Nothing found</h2>
}
